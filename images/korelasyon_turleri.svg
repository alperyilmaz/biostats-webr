  <text x="750" y="280" text-anchor="middle" fill="#64748b" font-size="11">Doğrusal ilişki yok</text>

  <!-- Bottom: scale bar -->
  <rect x="200" y="310" width="500" height="30" rx="15" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <linearGradient id="scale_grad" x1="0" y1="0" x2="1" y2="0" xmlns="http://www.w3.org/2000/svg">
    <stop offset="0%" stop-color="#ef4444"/>
    <stop offset="50%" stop-color="#e2e8f0"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <rect x="200" y="310" width="500" height="30" rx="15" fill="url(#scale_grad)" opacity="0.5"/>
  <text x="210" y="330" fill="#dc2626" font-size="12" font-weight="700">−1</text>
  <text x="450" y="330" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">0</text>
  <text x="688" y="330" text-anchor="end" fill="#16a34a" font-size="12" font-weight="700">+1</text>

  <text x="450" y="370" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Pearson korelasyon katsayısı (r) aralığı</text>
