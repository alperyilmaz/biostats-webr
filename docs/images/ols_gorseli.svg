<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#ffffff" rx="12"/>

  <text x="450" y="35" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">En Küçük Kareler Yöntemi (OLS)</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-size="13">Artıkların (residuals) karelerinin toplamını minimize eden doğruyu bulur</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="550" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="80" y1="380" x2="80" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="550" y="410" text-anchor="middle" fill="#64748b" font-size="13">X (bağımsız değişken)</text>
  <text x="40" y="230" text-anchor="middle" fill="#64748b" font-size="13" transform="rotate(-90,40,230)">Y (bağımlı değişken)</text>

  <!-- Regression line -->
  <line x1="100" y1="340" x2="520" y2="120" stroke="#2563eb" stroke-width="2.5"/>
  <text x="530" y="115" fill="#2563eb" font-size="13" font-weight="700">ŷ = β₀ + β₁x</text>

  <!-- Points and residual lines -->
  <!-- Point 1 -->
  <circle cx="140" cy="300" r="5" fill="#22c55e"/>
  <line x1="140" y1="300" x2="140" y2="315" stroke="#ef4444" stroke-width="2"/>
  <rect x="130" y="300" width="15" height="15" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 2 -->
  <circle cx="190" cy="270" r="5" fill="#22c55e"/>
  <line x1="190" y1="270" x2="190" y2="285" stroke="#ef4444" stroke-width="2"/>
  <rect x="180" y="270" width="15" height="15" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 3 (above line) -->
  <circle cx="240" cy="230" r="5" fill="#22c55e"/>
  <line x1="240" y1="230" x2="240" y2="255" stroke="#ef4444" stroke-width="2"/>
  <rect x="228" y="230" width="25" height="25" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 4 -->
  <circle cx="290" cy="240" r="5" fill="#22c55e"/>
  <line x1="290" y1="240" x2="290" y2="225" stroke="#ef4444" stroke-width="2"/>
  <rect x="278" y="225" width="15" height="15" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 5 (far above) -->
  <circle cx="340" cy="155" r="5" fill="#22c55e"/>
  <line x1="340" y1="155" x2="340" y2="195" stroke="#ef4444" stroke-width="2"/>
  <rect x="300" y="155" width="40" height="40" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 6 -->
  <circle cx="390" cy="180" r="5" fill="#22c55e"/>
  <line x1="390" y1="180" x2="390" y2="168" stroke="#ef4444" stroke-width="2"/>
  <rect x="378" y="168" width="12" height="12" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 7 -->
  <circle cx="440" cy="150" r="5" fill="#22c55e"/>
  <line x1="440" y1="150" x2="440" y2="140" stroke="#ef4444" stroke-width="2"/>
  <rect x="430" y="140" width="10" height="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Point 8 -->
  <circle cx="490" cy="140" r="5" fill="#22c55e"/>
  <line x1="490" y1="140" x2="490" y2="125" stroke="#ef4444" stroke-width="2"/>
  <rect x="478" y="125" width="15" height="15" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>

  <!-- Labels -->
  <!-- Residual label -->
  <line x1="345" y1="175" x2="400" y2="260" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="405" y="275" fill="#ef4444" font-size="12" font-weight="600">artık (eᵢ) = yᵢ − ŷᵢ</text>

  <!-- Squared area label -->
  <line x1="305" y1="170" x2="360" y2="300" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="365" y="315" fill="#ef4444" font-size="12">eᵢ² (kare alan)</text>

  <!-- Right panel: explanation -->
  <rect x="590" y="80" width="280" height="300" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="730" y="110" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">OLS Mantığı</text>

  <text x="620" y="145" fill="#334155" font-size="13">Her nokta ile doğru</text>
  <text x="620" y="165" fill="#334155" font-size="13">arasındaki dikey fark =</text>
  <text x="620" y="185" fill="#ef4444" font-size="14" font-weight="700">artık (residual)</text>

  <text x="620" y="220" fill="#334155" font-size="13">OLS bu artıkların</text>
  <text x="620" y="240" fill="#334155" font-size="13">karelerinin toplamını</text>
  <text x="620" y="260" fill="#334155" font-size="13">minimize eder:</text>

  <text x="730" y="295" text-anchor="middle" fill="#2563eb" font-size="16" font-weight="700">min Σ eᵢ²</text>
  <text x="730" y="318" text-anchor="middle" fill="#2563eb" font-size="13">= min Σ (yᵢ − ŷᵢ)²</text>

  <text x="730" y="355" text-anchor="middle" fill="#64748b" font-size="12">Neden kare?</text>
  <text x="730" y="372" text-anchor="middle" fill="#64748b" font-size="11">• Negatif/pozitif farklar</text>
  <text x="730" y="387" text-anchor="middle" fill="#64748b" font-size="11">  birbirini götürmesin</text>

  <!-- Legend -->
  <circle cx="610" y="430" r="5" fill="#22c55e"/>
  <text x="622" y="435" fill="#334155" font-size="12">Gözlem noktaları (yᵢ)</text>
  <line x1="720" y1="430" x2="750" y2="430" stroke="#2563eb" stroke-width="2.5"/>
  <text x="758" y="435" fill="#334155" font-size="12">Regresyon doğrusu (ŷ)</text>
</svg>
