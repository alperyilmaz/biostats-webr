<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', 'Helvetica Neue', sans-serif">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>

  <text x="450" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Regresyon Varsayımları — İyi vs Kötü</text>

  <!-- Row 1: Linearity -->
  <text x="225" y="65" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="700">✓ Varsayım karşılanıyor</text>
  <text x="675" y="65" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗ Varsayım ihlal ediliyor</text>

  <!-- 1. Doğrusallık — GOOD -->
  <rect x="30" y="80" width="190" height="140" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" rx="6"/>
  <text x="125" y="100" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">Doğrusallık</text>
  <line x1="50" y1="200" x2="200" y2="200" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="50" y1="200" x2="50" y2="105" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Random scatter around zero line -->
  <line x1="55" y1="155" x2="195" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="65" cy="145" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="80" cy="165" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="95" cy="150" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="110" cy="160" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="125" cy="148" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="140" cy="162" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="155" cy="145" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="170" cy="158" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="185" cy="152" r="3" fill="#22c55e" opacity="0.7"/>

  <!-- 1. Doğrusallık — BAD -->
  <rect x="460" y="80" width="190" height="140" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="6"/>
  <text x="555" y="100" text-anchor="middle" fill="#b91c1c" font-size="12" font-weight="600">Doğrusallık ihlali</text>
  <line x1="480" y1="200" x2="630" y2="200" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="480" y1="200" x2="480" y2="105" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="485" y1="155" x2="625" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- U-shaped pattern -->
  <circle cx="495" cy="130" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="510" cy="145" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="525" cy="160" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="540" cy="170" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="555" cy="175" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="570" cy="170" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="585" cy="158" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="600" cy="140" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="615" cy="125" r="3" fill="#ef4444" opacity="0.7"/>
  <path d="M495,130 Q555,180 615,125" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Labels column -->
  <text x="340" y="155" text-anchor="middle" fill="#64748b" font-size="11">Artık vs</text>
  <text x="340" y="170" text-anchor="middle" fill="#64748b" font-size="11">Tahmin grafiği</text>

  <!-- 2. Homojenlik — GOOD -->
  <rect x="30" y="240" width="190" height="140" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" rx="6"/>
  <text x="125" y="260" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">Eşit varyans (homoskedastisite)</text>
  <line x1="50" y1="360" x2="200" y2="360" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="50" y1="360" x2="50" y2="265" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="55" y1="315" x2="195" y2="315" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Constant spread -->
  <circle cx="65" cy="305" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="80" cy="325" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="95" cy="310" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="110" cy="320" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="125" cy="308" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="140" cy="322" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="155" cy="312" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="170" cy="318" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="185" cy="308" r="3" fill="#22c55e" opacity="0.7"/>

  <!-- 2. Homojenlik — BAD -->
  <rect x="460" y="240" width="190" height="140" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="6"/>
  <text x="555" y="260" text-anchor="middle" fill="#b91c1c" font-size="12" font-weight="600">Heteroskedastisite</text>
  <line x1="480" y1="360" x2="630" y2="360" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="480" y1="360" x2="480" y2="265" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="485" y1="315" x2="625" y2="315" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Funnel shape: spread increases -->
  <circle cx="495" cy="313" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="510" cy="318" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="520" cy="310" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="540" cy="300" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="545" cy="330" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="565" cy="290" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="570" cy="340" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="590" cy="278" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="595" cy="350" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="615" cy="270" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="618" cy="355" r="3" fill="#ef4444" opacity="0.7"/>

  <text x="340" y="315" text-anchor="middle" fill="#64748b" font-size="11">Varyans sabit</text>
  <text x="340" y="330" text-anchor="middle" fill="#64748b" font-size="11">kalmalı</text>

  <!-- Right column: Normality Q-Q -->
  <!-- GOOD -->
  <rect x="240" y="80" width="190" height="140" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" rx="6"/>
  <text x="335" y="100" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">Normal artıklar</text>
  <line x1="260" y1="200" x2="410" y2="200" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="260" y1="200" x2="260" y2="105" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="265" y1="195" x2="405" y2="110" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Points along diagonal -->
  <circle cx="275" cy="190" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="290" cy="182" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="305" cy="172" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="320" cy="160" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="335" cy="152" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="350" cy="143" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="365" cy="135" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="380" cy="125" r="3" fill="#22c55e" opacity="0.7"/>
  <circle cx="395" cy="115" r="3" fill="#22c55e" opacity="0.7"/>

  <!-- BAD -->
  <rect x="670" y="80" width="190" height="140" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="6"/>
  <text x="765" y="100" text-anchor="middle" fill="#b91c1c" font-size="12" font-weight="600">Normal olmayan artıklar</text>
  <line x1="690" y1="200" x2="840" y2="200" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="690" y1="200" x2="690" y2="105" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="695" y1="195" x2="835" y2="110" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- S-shaped deviation -->
  <circle cx="705" cy="195" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="715" cy="192" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="730" cy="185" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="745" cy="170" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="760" cy="148" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="775" cy="140" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="790" cy="138" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="810" cy="120" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="830" cy="112" r="3" fill="#ef4444" opacity="0.7"/>
  <path d="M705,195 Q750,175 760,148 Q775,130 830,112" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom: 4 assumptions summary -->
  <rect x="50" y="410" width="800" height="70" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="435" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">4 Temel Varsayım: LINE</text>
  <text x="450" y="462" text-anchor="middle" fill="#64748b" font-size="13">
    <tspan fill="#2563eb" font-weight="700">L</tspan>inearity (doğrusallık)  •  
    <tspan fill="#2563eb" font-weight="700">I</tspan>ndependence (bağımsızlık)  •  
    <tspan fill="#2563eb" font-weight="700">N</tspan>ormality (normallik)  •  
    <tspan fill="#2563eb" font-weight="700">E</tspan>qual variance (eşit varyans)
  </text>
</svg>
