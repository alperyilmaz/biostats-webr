<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="boy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="girl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="both_boy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700">İki Çocuk Problemi</text>
  <text x="450" y="76" text-anchor="middle" fill="#94a3b8" font-size="15">"En az biri erkek ise, ikisinin de erkek olma olasılığı nedir?"</text>

  <!-- SECTION 1: Full Sample Space Ω -->
  <text x="130" y="126" fill="#e2e8f0" font-size="18" font-weight="700">Evrensel Küme  Ω = {EE, EK, KE, KK}</text>
  <text x="632" y="126" fill="#64748b" font-size="14">|Ω| = 4</text>

  <!-- Four cards for all outcomes -->
  <!-- Card EE -->
  <rect x="70" y="148" width="170" height="130" rx="12" fill="#0f2940" stroke="#1e4976" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="182" text-anchor="middle" fill="#60a5fa" font-size="36">👦👦</text>
  <text x="155" y="216" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">EE</text>
  <text x="155" y="240" text-anchor="middle" fill="#94a3b8" font-size="13">Erkek + Erkek</text>
  <text x="155" y="265" text-anchor="middle" fill="#64748b" font-size="12">P = 1/4</text>

  <!-- Card EK -->
  <rect x="260" y="148" width="170" height="130" rx="12" fill="#0f2940" stroke="#1e4976" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="345" y="182" text-anchor="middle" fill="#60a5fa" font-size="36">👦👧</text>
  <text x="345" y="216" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">EK</text>
  <text x="345" y="240" text-anchor="middle" fill="#94a3b8" font-size="13">Erkek + Kız</text>
  <text x="345" y="265" text-anchor="middle" fill="#64748b" font-size="12">P = 1/4</text>

  <!-- Card KE -->
  <rect x="450" y="148" width="170" height="130" rx="12" fill="#0f2940" stroke="#1e4976" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="535" y="182" text-anchor="middle" fill="#60a5fa" font-size="36">👧👦</text>
  <text x="535" y="216" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">KE</text>
  <text x="535" y="240" text-anchor="middle" fill="#94a3b8" font-size="13">Kız + Erkek</text>
  <text x="535" y="265" text-anchor="middle" fill="#64748b" font-size="12">P = 1/4</text>

  <!-- Card KK -->
  <rect x="640" y="148" width="170" height="130" rx="12" fill="#0f2940" stroke="#1e4976" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="182" text-anchor="middle" fill="#ec4899" font-size="36">👧👧</text>
  <text x="725" y="216" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">KK</text>
  <text x="725" y="240" text-anchor="middle" fill="#94a3b8" font-size="13">Kız + Kız</text>
  <text x="725" y="265" text-anchor="middle" fill="#64748b" font-size="12">P = 1/4</text>

  <!-- Divider -->
  <line x1="70" y1="310" x2="830" y2="310" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- SECTION 2: Conditioned Space -->
  <text x="130" y="348" fill="#fbbf24" font-size="18" font-weight="700">Koşul: "En az biri erkek"</text>
  <text x="560" y="348" fill="#64748b" font-size="14">KK elendi → Yeni Ω' = {EE, EK, KE} , |Ω'| = 3</text>

  <!-- Three remaining cards, highlighted -->
  <!-- Card EE — TARGET -->
  <rect x="120" y="375" width="190" height="150" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="2.5" filter="url(#glow2)"/>
  <text x="215" y="415" text-anchor="middle" fill="#34d399" font-size="42">👦👦</text>
  <text x="215" y="455" text-anchor="middle" fill="#ecfdf5" font-size="22" font-weight="700">EE ✓</text>
  <text x="215" y="480" text-anchor="middle" fill="#a7f3d0" font-size="14">İkisi de erkek</text>
  <text x="215" y="508" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="700">P = 1/3</text>

  <!-- Card EK -->
  <rect x="350" y="375" width="190" height="150" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="445" y="415" text-anchor="middle" fill="#94a3b8" font-size="42">👦👧</text>
  <text x="445" y="455" text-anchor="middle" fill="#cbd5e1" font-size="22" font-weight="700">EK</text>
  <text x="445" y="480" text-anchor="middle" fill="#94a3b8" font-size="14">En az biri erkek ✓</text>
  <text x="445" y="508" text-anchor="middle" fill="#64748b" font-size="16">P = 1/3</text>

  <!-- Card KE -->
  <rect x="580" y="375" width="190" height="150" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="675" y="415" text-anchor="middle" fill="#94a3b8" font-size="42">👧👦</text>
  <text x="675" y="455" text-anchor="middle" fill="#cbd5e1" font-size="22" font-weight="700">KE</text>
  <text x="675" y="480" text-anchor="middle" fill="#94a3b8" font-size="14">En az biri erkek ✓</text>
  <text x="675" y="508" text-anchor="middle" fill="#64748b" font-size="16">P = 1/3</text>

  <!-- Divider -->
  <line x1="70" y1="558" x2="830" y2="558" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bottom: Key insight -->
  <rect x="100" y="575" width="700" height="100" rx="12" fill="#0c1524" stroke="#1e3a5f" stroke-width="1"/>

  <text x="450" y="606" text-anchor="middle" fill="#fbbf24" font-size="17" font-weight="700">Sezgisel Cevap: 1/2    vs    Doğru Cevap: 1/3</text>

  <text x="450" y="636" text-anchor="middle" fill="#94a3b8" font-size="14">Yanılgının kaynağı: EK ve KE'yi tek sonuç gibi düşünmek</text>
  <text x="450" y="658" text-anchor="middle" fill="#64748b" font-size="13">Evrensel kümeyi doğru tanımlamak → doğru olasılık</text>
</svg>
